{% extends 'base.html' %}

{% block content %}
<section class="card">
    <h2>Editar Produto</h2>
    <form method="post" class="form-grid cols-3">
        <label>SKU
            <input type="text" name="sku" value="{{ product['sku'] or '' }}" placeholder="Ex.: PRD00040">
        </label>
        <label>Nome
            <input type="text" name="name" value="{{ product['name'] }}" required>
        </label>
        <label>Comprimento (cm)
            <input type="number" step="0.01" min="0" name="length_cm" value="{{ product['length_cm'] }}" required>
        </label>
        <label>Largura (cm)
            <input type="number" step="0.01" min="0" name="width_cm" value="{{ product['width_cm'] }}" required>
        </label>
        <label>Altura (cm)
            <input type="number" step="0.01" min="0" name="height_cm" value="{{ product['height_cm'] }}" required>
        </label>
        <label>Peso
            <input type="number" step="0.001" min="0" name="weight" value="{{ product['weight'] }}" inputmode="decimal" lang="pt-BR" placeholder="Ex.: 0,085" required>
        </label>
        <div style="display: flex; gap: 1rem;">
            <button type="submit">Atualizar Produto</button>
            <a href="{{ url_for('products') }}" style="padding: 0.5rem 1rem; background: #666; color: white; text-decoration: none; border-radius: 4px; display: flex; align-items: center;">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
