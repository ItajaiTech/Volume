{% extends 'base.html' %}

{% block content %}
<section class="card">
    <h2>Editar Embalagem</h2>
    <form method="post" class="form-grid cols-3">
        <label>Nome
            <input type="text" name="name" value="{{ box['name'] }}" required>
        </label>
        <label>Comprimento (cm)
            <input type="number" step="0.01" min="0" name="length_cm" value="{{ box['length_cm'] }}" required>
        </label>
        <label>Largura (cm)
            <input type="number" step="0.01" min="0" name="width_cm" value="{{ box['width_cm'] }}" required>
        </label>
        <label>Altura (cm)
            <input type="number" step="0.01" min="0" name="height_cm" value="{{ box['height_cm'] }}" required>
        </label>
        <label>Peso Maximo
            <input type="number" step="0.01" min="0" name="max_weight" value="{{ box['max_weight'] }}" required>
        </label>
        <label style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1.8rem;">
            <input type="checkbox" name="is_active" value="1" {% if box['is_active'] %}checked{% endif %}>
            Ativa para recomendacao
        </label>
        <div style="display: flex; gap: 1rem;">
            <button type="submit">Atualizar Embalagem</button>
            <a href="{{ url_for('boxes') }}" style="padding: 0.5rem 1rem; background: #666; color: white; text-decoration: none; border-radius: 4px; display: flex; align-items: center;">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
